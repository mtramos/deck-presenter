<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Example Deck</title>
<style>
  html,body{margin:0;height:100%;background:#0b0d0d;color:#fffdf5;
    font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden;}
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .slide{position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:8vw;}
  .slide.on{display:flex;}
  h1{font-size:clamp(32px,7vw,96px);margin:0 0 .3em;letter-spacing:-0.02em;}
  p{font-size:clamp(16px,2.4vw,30px);color:#9fb0ac;margin:0;}
  .num{position:fixed;bottom:18px;right:22px;font-family:monospace;color:#5e6765;font-size:14px;}
  .s1{background:radial-gradient(circle at 30% 30%,#13312f,#0b0d0d);}
  .s2{background:radial-gradient(circle at 70% 40%,#2a2410,#0b0d0d);}
  .s3{background:radial-gradient(circle at 50% 60%,#101c2e,#0b0d0d);}
</style>
</head>
<body>
  <div class="stage">
    <section class="slide s1 on"><h1>Welcome</h1><p>Example deck for the Presenter Console</p></section>
    <section class="slide s2"><h1>The idea</h1><p>Advance from the console - this deck follows.</p></section>
    <section class="slide s3"><h1>Thank you</h1><p>Replace this deck with your own.</p></section>
  </div>
  <div class="num" id="num">1 / 3</div>

  <script>
    // Minimal deck with arrow-key nav + a deckAPI for full two-way sync.
    (function () {
      var slides = Array.prototype.slice.call(document.querySelectorAll(".slide"));
      var i = 0;
      function show(n) {
        i = Math.max(0, Math.min(slides.length - 1, n));
        slides.forEach(function (s, k) { s.classList.toggle("on", k === i); });
        document.getElementById("num").textContent = (i + 1) + " / " + slides.length;
        if (window.deckReport) window.deckReport(); // keep the console in sync
      }
      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " ") { e.preventDefault(); show(i + 1); }
        else if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); show(i - 1); }
        else if (e.key === "Home") show(0);
        else if (e.key === "End") show(slides.length - 1);
      });
      // Full-sync API the adapter will use if present:
      window.deckAPI = {
        next: function () { show(i + 1); },
        prev: function () { show(i - 1); },
        goto: function (n) { show(n); },
        get index() { return i; },
        get total() { return slides.length; }
      };
    })();
  </script>
  <!-- Connect this deck to the Presenter Console: -->
  <script src="../deck-adapter.js"></script>
</body>
</html>
