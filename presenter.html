<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Presenter Console</title>
<style>
  :root{
    --bg:#0b0d0d; --panel:#121615; --surface:#1d2422; --surface-hover:#27302d;
    --ink:#fffdf5; --say:#f3f1e8; --muted:#8a938f;
    --accent:#f2c230; --on-accent:#0b0d0d; --cue:#f2c230; --teal:#36c2be;
    --line:rgba(255,255,255,0.10); --dot-off:#5a5a5a;
    --font:"Segoe UI",Roboto,-apple-system,Helvetica,Arial,sans-serif;
    --mono:"SFMono-Regular",Consolas,"Roboto Mono",monospace;
  }
  /* light palette - applied when config.js sets theme.mode "light" (or "auto" on a light OS) */
  :root[data-theme="light"]{
    --bg:#f4f3ea; --panel:#ffffff; --surface:#eef0e9; --surface-hover:#e2e6dd;
    --ink:#101817; --say:#1b211f; --muted:#5a635f;
    --accent:#0b4a4c; --on-accent:#ffffff; --cue:#8a6a00; --teal:#0b4a4c;
    --line:rgba(11,74,76,0.16); --dot-off:#b9beb6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg); color:var(--ink); font-family:var(--font);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;}
  header{flex:0 0 auto; display:flex; align-items:center; gap:14px;
    padding:12px 18px; background:var(--panel); border-bottom:1px solid var(--line);}
  .counter{font-family:var(--mono); font-weight:700; font-size:20px; letter-spacing:.04em; color:var(--accent); white-space:nowrap;}
  .title{font-size:19px; font-weight:600; flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .time{font-family:var(--mono); font-size:13px; color:var(--muted); white-space:nowrap;}
  .btn{font:inherit; font-size:15px; font-weight:600; color:var(--ink);
    background:var(--surface); border:1px solid var(--line); border-radius:9px;
    padding:9px 14px; cursor:pointer; white-space:nowrap; transition:background .12s;}
  .btn:hover{background:var(--surface-hover);}
  .btn.primary{background:var(--accent); color:var(--on-accent); border-color:transparent;}
  .status{display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); white-space:nowrap;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--dot-off);}
  .dot.on{background:var(--teal);}
  main{flex:1 1 auto; overflow-y:auto; padding:30px 40px 24px; scroll-behavior:smooth;}
  .notes{max-width:1100px; margin:0 auto;}
  .slidehead{font-size:15px; font-family:var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--teal); margin:0 0 18px;}
  .say{font-size:clamp(20px,2.1vw,28px); line-height:1.5; margin:0 0 16px; color:var(--say);}
  .say strong{color:var(--accent); font-weight:700;}
  .cue{font-size:clamp(14px,1.4vw,18px); line-height:1.4; margin:0 0 16px; color:var(--cue);
    font-style:italic; padding-left:14px; border-left:3px solid rgba(242,194,48,.5);}
  .sp{height:6px;}
  .help{max-width:760px; margin:6vh auto; line-height:1.6; font-size:17px; color:var(--say);}
  .help code{font-family:var(--mono); background:var(--surface); padding:2px 6px; border-radius:5px; font-size:14px;}
  .help h2{color:var(--accent);}
  .nextup{max-width:1100px; margin:26px auto 0; padding-top:16px; border-top:1px solid var(--line); font-size:15px; color:var(--muted);}
  .nextup b{color:var(--ink); font-weight:600;}
  footer{flex:0 0 auto; display:flex; gap:2px; border-top:1px solid var(--line); background:var(--panel);}
  .adv{flex:1 1 auto; display:flex; align-items:center; justify-content:center; gap:12px;
    padding:18px; font-size:19px; font-weight:700; cursor:pointer; user-select:none; background:var(--surface); color:var(--ink); transition:background .12s;}
  .adv:hover{background:var(--surface-hover);}
  .adv:active{background:var(--teal); color:var(--on-accent);}
  .adv.prev{flex:0 0 22%; background:var(--panel); color:var(--muted); font-size:16px;}
  .adv.prev:hover{background:var(--surface-hover); color:var(--ink);}
  .adv .hint{font-size:13px; font-weight:400; color:var(--muted);}
  .adv:active .hint{color:var(--on-accent);}
  .flash{animation:flash .35s ease;}
  @keyframes flash{0%{background:var(--teal);}100%{background:var(--surface);}}
</style>
</head>
<body>
  <header>
    <span class="counter" id="counter">- / -</span>
    <span class="title" id="title">Presenter Console</span>
    <span class="time" id="time"></span>
    <span class="status"><span class="dot" id="dot"></span><span id="statusText">Deck not open</span></span>
    <button class="btn primary" id="openBtn">Open deck ↗</button>
  </header>
  <main id="scroll">
    <div class="notes">
      <p class="slidehead" id="slidehead"></p>
      <div id="body"></div>
    </div>
    <div class="nextup" id="nextup"></div>
  </main>
  <footer>
    <div class="adv prev" id="prevBar">◀ Back</div>
    <div class="adv" id="nextBar"><span id="nextLabel">Advance ▶</span> <span class="hint" id="nextHint">click, or press Space / →</span></div>
  </footer>

<!-- Your deck URL + notes live here. Edit this file, not presenter.html. -->
<script src="config.js"></script>
<script>
/* =====================================================================
   PRESENTER CONSOLE  (engine - you normally don't edit this file)
   Reads window.PRESENTER = { deckUrl, slides:[{n,title,time,notes}] }
   from config.js. Drives your deck in a second window via postMessage.
   ===================================================================== */
const CFG = (window.PRESENTER || {});
const SLIDES = Array.isArray(CFG.slides) ? CFG.slides : [];
const DECK_URL = CFG.deckUrl || "";
const TOTAL = SLIDES.length;

/* ---- optional theming (config.js → theme) ----
   theme: {
     mode:   "dark" | "light" | "auto",      // default "dark"; "auto" follows the OS
     colors: { accent, bg, panel, surface, text, ink, muted, cue, teal, onAccent, line }
   }                                           // any subset; omit theme entirely for the default */
(function applyTheme(){
  const t = CFG.theme || {};
  const root = document.documentElement;
  let mode = t.mode || "dark";
  if(mode === "auto") mode = (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
  if(mode === "light") root.setAttribute("data-theme", "light");
  const map = { bg:"--bg", panel:"--panel", surface:"--surface", accent:"--accent",
    onAccent:"--on-accent", text:"--say", ink:"--ink", muted:"--muted",
    cue:"--cue", teal:"--teal", line:"--line" };
  const colors = t.colors || {};
  Object.keys(colors).forEach(k => { if(map[k]) root.style.setProperty(map[k], colors[k]); });
})();

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,"0");
let cur = 0, deckWin = null;

/* ---- setup help when no config is present ---- */
function showHelp(){
  const wrap = $("body"); wrap.textContent = "";
  const h = document.createElement("div"); h.className = "help";
  const add = (tag, text, code) => { const e=document.createElement(tag); if(code){ e.appendChild(document.createTextNode(text)); } else { e.textContent=text; } h.appendChild(e); return e; };
  add("h2","Add your deck and notes");
  add("p","Edit config.js so it sets window.PRESENTER with your deck URL and your notes, then reload this page. Minimal example:");
  const pre=document.createElement("pre"); pre.style.cssText="font-family:var(--mono);background:var(--surface);padding:16px;border-radius:8px;overflow:auto;font-size:13px;line-height:1.5;color:var(--say);";
  pre.textContent =
'window.PRESENTER = {\n'+
'  deckUrl: "my-deck.html",\n'+
'  slides: [\n'+
'    { n:1, title:"Intro", time:"~1 min", notes:`Your spoken notes here.\n\n[bracketed lines show as dim cues]\n\n**bold = emphasis**` },\n'+
'    { n:2, title:"Next", notes:`...` }\n'+
'  ]\n'+
'};';
  h.appendChild(pre);
  add("p","See README.md for connecting your deck so the Advance button controls it.");
  wrap.appendChild(h);
  $("counter").textContent = "- / -";
  $("title").textContent = "Presenter Console - setup";
  $("nextup").textContent = "";
}

/* ---- render a slide's notes (safe DOM, no innerHTML) ---- */
function renderBody(notes){
  const wrap = $("body"); wrap.textContent = "";
  String(notes||"").split("\n").forEach(line => {
    const t = line.trim();
    if(t === ""){ const d=document.createElement("div"); d.className="sp"; wrap.appendChild(d); return; }
    if(/^\[.*\]$/.test(t)){ const d=document.createElement("div"); d.className="cue"; d.textContent=t; wrap.appendChild(d); return; }
    const p=document.createElement("p"); p.className="say";
    line.split(/(\*\*.+?\*\*)/g).forEach(part=>{
      if(!part) return;
      if(/^\*\*.+\*\*$/.test(part)){ const s=document.createElement("strong"); s.textContent=part.slice(2,-2); p.appendChild(s); }
      else p.appendChild(document.createTextNode(part));
    });
    wrap.appendChild(p);
  });
}

function render(){
  if(!TOTAL){ showHelp(); return; }
  const s = SLIDES[cur];
  $("counter").textContent = pad((s.n!=null?s.n:cur+1)) + " / " + pad(TOTAL);
  $("title").textContent = s.title || "";
  $("time").textContent = s.time || "";
  $("slidehead").textContent = "Slide " + pad((s.n!=null?s.n:cur+1));
  renderBody(s.notes);
  $("scroll").scrollTop = 0;
  const next = SLIDES[cur+1];
  const nu = $("nextup"); nu.textContent = "";
  if(next){ nu.appendChild(document.createTextNode("Next up → ")); const b=document.createElement("b"); b.textContent=(next.title||("Slide "+(cur+2))); nu.appendChild(b); }
  else { const b=document.createElement("b"); b.textContent="- end -"; nu.appendChild(b); }
  $("prevBar").style.visibility = cur===0 ? "hidden" : "visible";
  $("nextLabel").textContent = cur===TOTAL-1 ? "End" : "Advance ▶";
  $("nextHint").style.display = cur===TOTAL-1 ? "none" : "";
}

/* ---- deck link ---- */
const deckOpen = () => deckWin && !deckWin.closed;
function setStatus(){
  const on = deckOpen();
  $("dot").classList.toggle("on", on);
  $("statusText").textContent = on ? "Deck connected" : "Deck not open";
  $("openBtn").textContent = on ? "Focus deck ↗" : "Open deck ↗";
}
function send(action){ if(deckOpen()){ try{ deckWin.postMessage({source:"presenter-console", action, index:cur}, "*"); }catch(e){} } }
function go(index){ cur = Math.max(0, Math.min(TOTAL-1, index)); render(); send("goto"); }
function openDeck(){
  if(!DECK_URL){ alert("Set deckUrl in config.js first."); return; }
  if(deckOpen()){ deckWin.focus(); send("goto"); setStatus(); return; }
  deckWin = window.open(DECK_URL, "presenterdeck", "width=1280,height=720,left=120,top=120");
  if(!deckWin){ alert("The deck window was blocked. Allow pop-ups, then click Open deck again."); return; }
  setStatus();
  setTimeout(()=>{ send("goto"); setStatus(); }, 500);
}
function flash(el){ el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash"); }

/* deck → console sync (only if your deck includes deck-adapter.js) */
window.addEventListener("message",(e)=>{
  const d = e.data || {};
  if(d.source !== "presenter-deck") return;
  if(d.ready) send("goto");
  if(typeof d.index === "number" && d.index !== cur){ cur = Math.max(0,Math.min(TOTAL-1,d.index)); render(); }
});

$("openBtn").addEventListener("click", openDeck);
$("nextBar").addEventListener("click", ()=>{ if(cur<TOTAL-1){ go(cur+1); flash($("nextBar")); } });
$("prevBar").addEventListener("click", ()=>{ if(cur>0) go(cur-1); });
document.addEventListener("keydown",(e)=>{
  if(e.key===" "||e.key==="ArrowRight"||e.key==="PageDown"||e.key==="ArrowDown"){ e.preventDefault(); if(cur<TOTAL-1){ go(cur+1); flash($("nextBar")); } }
  else if(e.key==="ArrowLeft"||e.key==="PageUp"||e.key==="ArrowUp"){ e.preventDefault(); if(cur>0) go(cur-1); }
  else if(e.key==="Home"){ e.preventDefault(); go(0); }
  else if(e.key==="End"){ e.preventDefault(); go(TOTAL-1); }
});
setInterval(setStatus, 1000);
render();
setStatus();
</script>
</body>
</html>
